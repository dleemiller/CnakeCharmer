repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/MarcoGorelli/cython-lint
    rev: v0.19.0
    hooks:
      - id: cython-lint
        args: [--no-pycodestyle]
        files: ^(cnake_charmer|cnake_data)/

# Gemma 4 31B — local vLLM server
model:
  id: openai/gemma-4-31b
  base_url: http://localhost:8004/v1
  api_key_env: APIKEY
  # NOTE: enable_thinking interferes with DSPy's field parsing —
  # thinking content leaks into content field and breaks [[ ## ]] markers.
  # DSPy's ReAct next_thought field provides structured reasoning instead.

prompt:
  program: data/optimized_prompts/openai_gemma-4-31b/program.json
  id: gepa_gemma4

optimization:
  reflection_model: openrouter/z-ai/glm-5
  val_size: 10
  threads: 8

# Base model profile — all profiles inherit from this.
model:
  temperature: 1.0
  top_p: null
  max_tokens: 8192
  cache: false
  base_url: null
  thinking_react: false

collection:
  attempts: 2
  max_iters: 4
  shuffle: true
  parallel: null
  display: live
  sandbox_events: false
  error_log: data/traces/trace_errors.log
  error_log_max_mb: 10
  error_log_backups: 5
  output: data/traces/master_traces.jsonl

prompt:
  program: null

wiki:
  enable: true

optimization:
  reflection_model: null
  val_size: 50
  subset: 150
  threads: 2
